<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chytrá Peněženka</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --primary: #4f46e5; --success: #10b981; --danger: #ef4444; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); width: 90%; max-width: 380px; text-align: center; }
        h2 { color: #64748b; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.5rem; }
        #total { font-size: 3.2rem; font-weight: 800; color: #1e293b; margin-bottom: 2rem; display: block; }
        input { width: 100%; padding: 16px; border: 2px solid #e2e8f0; border-radius: 18px; font-size: 1.2rem; text-align: center; outline: none; transition: 0.3s; background: #f8fafc; margin-bottom: 1.5rem; box-sizing: border-box; }
        input:focus { border-color: var(--primary); background: white; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 16px; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; color: white; font-size: 1rem; transition: transform 0.1s; text-transform: uppercase; }
        button:active { transform: scale(0.95); }
        .btn-add { background: var(--success); }
        .btn-sub { background: var(--danger); }
    </style>
</head>
<body>

    <div class="card">
        <h2>Aktuální stav účtu</h2>
        <span id="total">Načítám...</span>
        <input type="number" id="amount" placeholder="Zadejte částku" inputmode="decimal">
        <div class="actions">
            <button class="btn-sub" onclick="update(false)">− Výdaj</button>
            <button class="btn-add" onclick="update(true)">+ Příjem</button>
        </div>
    </div>

    <script>
        // Konfigurace z Vašeho projektu Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAInlFG4VGt64JG7tXMK9Fkq5HgRmwO8RU",
            authDomain: "zustatek-uctu.firebaseapp.com",
            databaseURL: "https://zustatek-uctu-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "zustatek-uctu",
            storageBucket: "zustatek-uctu.firebasestorage.app",
            messagingSenderId: "251250690938",
            appId: "1:251250690938:web:7fe466982ae39bdb56e4c3",
            measurementId: "G-YX52FPBFJ5"
        };

        // Inicializace Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('zustatek');
        let currentBalance = 0;

        // Načítání a synchronizace dat v reálném čase
        db.on('value', (snapshot) => {
            currentBalance = snapshot.val() || 0;
            document.getElementById('total').innerText = currentBalance.toLocaleString('cs-CZ') + ' Kč';
        });

        // Funkce pro odeslání dat do cloudu
        function update(isAdding) {
            const input = document.getElementById('amount');
            const val = parseFloat(input.value);
            
            if (isNaN(val) || val <= 0) {
                alert("Prosím zadejte platné číslo.");
                return;
            }

            const newBalance = isAdding ? currentBalance + val : currentBalance - val;
            
            // Zápis do Firebase
            db.set(newBalance).then(() => {
                input.value = '';
                input.focus();
            }).catch((error) => {
                console.error("Chyba při zápisu: ", error);
            });
        }
    </script>
</body>
</html>
